<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<title>Hesya Store · Dashboard (Print)</title>

<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400;1,9..144,500;1,9..144,600&family=Source+Sans+3:ital,wght@0,400;0,500;0,600;0,700&family=JetBrains+Mono:wght@400;500;600;700&display=swap"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pretendard@1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css"/>

<link rel="stylesheet" href="tokens.css"/>
<link rel="stylesheet" href="components.css"/>
<link rel="stylesheet" href="dashboard.css"/>

<style>
  /* Print-friendly overrides */
  @page {
    size: 1440px 1800px;
    margin: 0;
  }
  html, body {
    background: var(--hesya-peach-50);
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
    margin: 0;
  }
  /* Force the app to a fixed render width matching the design viewport */
  #root {
    width: 1440px;
    margin: 0 auto;
  }
  /* Disable hover / animations / sticky behaviours so the static layout flows on paper */
  *, *::before, *::after {
    animation-duration: 0s !important;
    animation-delay: 0s !important;
    transition: none !important;
  }
  .sd-topbar { position: static !important; }
  .sd-shell { min-height: 0 !important; height: auto !important; }
  .sd-sidebar { height: auto !important; min-height: 0 !important; }
  .sd-main { max-height: none !important; overflow: visible !important; }
  .sd-toast-stack {
    position: static !important;
    max-height: none !important;
    overflow: visible !important;
    top: auto !important;
  }
  /* Prevent breaking bento tiles, the timeline, reviews, etc. mid-element */
  .sd-tile,
  .sd-bright-spot,
  .sd-timeline,
  .sd-insight,
  .sd-review-card,
  .sd-toast {
    break-inside: avoid;
    page-break-inside: avoid;
  }
  /* Allow the long page to flow naturally onto multiple PDF pages */
  @media print {
    html, body { width: 1440px; }
    .sd-app { width: 1440px; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="dashboard-app.jsx"></script>

<!-- Auto-print after fonts + Babel + React render -->
<script type="text/babel" data-presets="env,react">
(async function autoPrint() {
  try {
    if (document.fonts && document.fonts.ready) {
      await document.fonts.ready;
    }
  } catch (e) {}
  // Wait for React render + babel-compiled scripts to mount.
  // Poll until #root has children (or 5s timeout), then add a 500ms safety pad.
  const root = document.getElementById('root');
  const deadline = Date.now() + 5000;
  while (Date.now() < deadline && (!root || !root.firstChild)) {
    await new Promise(r => setTimeout(r, 100));
  }
  await new Promise(r => setTimeout(r, 500));
  window.print();
})();
</script>
</body>
</html>
