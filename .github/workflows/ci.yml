name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      # CI build dummy values — schema validation only (no real connection).
      # See PROGRESS.md S-11 / learnings L-024. Vercel preview/prod uses real secrets.
      NEXT_PUBLIC_APP_URL: http://localhost:4200
      NEXT_PUBLIC_SUPABASE_URL: https://x.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: dummy_anon_key_for_ci_build_xxxxxxx
      SUPABASE_SERVICE_ROLE_KEY: dummy_service_role_for_ci_build_xxxx
      DATABASE_URL: postgres://x:x@x.pooler.supabase.com:6543/postgres
      BETTER_AUTH_SECRET: ci_dummy_secret_minimum_32_chars_long_xxx
      BETTER_AUTH_URL: http://localhost:4200
      GOOGLE_CLIENT_ID: ci-dummy-google-client-id
      GOOGLE_CLIENT_SECRET: ci-dummy-google-client-secret
      SENTRY_DSN: https://x@x.ingest.sentry.io/0
      NEXT_PUBLIC_SENTRY_DSN: https://x@x.ingest.sentry.io/0
      NEXT_PUBLIC_POSTHOG_KEY: phc_dummy_for_ci_build
      NEXT_PUBLIC_POSTHOG_HOST: https://eu.i.posthog.com
      # Epic 9 KYC (E9-2~E9-13) — data.go.kr Decoding 인증키 (CI dummy, min 20 chars)
      KOREA_NTS_API_KEY: ci_dummy_korea_nts_key_xxxxxxxxxxxxxx
      KOREA_LOCALDATA_API_KEY: ci_dummy_korea_localdata_key_xxxxxxxx
      # Admin 화이트리스트 — 검증 페이지·KYC Server Action 접근 제어
      ADMIN_EMAILS: ci-dummy-admin@example.com
      # E9-10 cron 자동 재검증 (Vercel Cron Authorization Bearer 검증, min 32 chars)
      CRON_SECRET: ci_dummy_cron_secret_xxxxxxxxxxxxxxxxxxxxxxxx
      # E9-9 KYC 결과 알림 (Resend Free, dummy: re_ prefix + 유효 email format)
      RESEND_API_KEY: re_ci_dummy_resend_api_key
      RESEND_FROM_EMAIL: ci-dummy@resend.dev
      # E9-4 카테고리 자동 분류 (Anthropic Sonnet 4.6, dummy: sk-ant- prefix)
      ANTHROPIC_API_KEY: sk-ant-ci-dummy-anthropic-api-key-xxxxxxxx
      # B-4a RAG 임베딩 (OpenAI text-embedding-3-small, dummy: sk- prefix)
      OPENAI_API_KEY: sk-ci-dummy-openai-api-key-xxxxxxxx
      # Epic 1-1A Instagram (Meta App, dummy values for CI build only).
      # Values intentionally match vitest.setup.ts stubs so test assertions
      # (e.g. /client_id=stub-ig-app-id/) hold under CI where process.env
      # is pre-set and overrides setup defaults.
      IG_APP_ID: stub-ig-app-id
      IG_APP_SECRET: stub-ig-app-secret
      IG_WEBHOOK_VERIFY_TOKEN: stub-ig-verify-token
      IG_REDIRECT_URI: https://stub.example.com/api/oauth/instagram/callback
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Type Check
        run: pnpm -r type-check

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm -r test

      - name: Build
        run: pnpm build

      - name: Gitleaks (secret scan)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  e2e-smoke:
    # validate와 병렬 실행 (wall time 단축). e2e가 인프라만 검증하므로 validate
    # 결과와 무관. validate 실패 시 PR 자체가 머지 불가라 e2e 자원 낭비 미미.
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # ⚠️ env 블록은 validate job과 의도적으로 동일 (Next.js dev 서버가
    #    env.ts zod parse를 통과해야 기동). env.ts 추가 시 양쪽 동기화 의무 (L-053).
    #    GitHub Actions는 yaml anchor 미지원 → composite action으로 추출은
    #    별 작업 (현재 19개 변수, 동기화 누락 시 build 실패로 즉각 발견).
    env:
      NEXT_PUBLIC_APP_URL: http://localhost:4200
      NEXT_PUBLIC_SUPABASE_URL: https://x.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: dummy_anon_key_for_ci_build_xxxxxxx
      SUPABASE_SERVICE_ROLE_KEY: dummy_service_role_for_ci_build_xxxx
      DATABASE_URL: postgres://x:x@x.pooler.supabase.com:6543/postgres
      BETTER_AUTH_SECRET: ci_dummy_secret_minimum_32_chars_long_xxx
      BETTER_AUTH_URL: http://localhost:4200
      GOOGLE_CLIENT_ID: ci-dummy-google-client-id
      GOOGLE_CLIENT_SECRET: ci-dummy-google-client-secret
      SENTRY_DSN: https://x@x.ingest.sentry.io/0
      NEXT_PUBLIC_SENTRY_DSN: https://x@x.ingest.sentry.io/0
      NEXT_PUBLIC_POSTHOG_KEY: phc_dummy_for_ci_build
      NEXT_PUBLIC_POSTHOG_HOST: https://eu.i.posthog.com
      KOREA_NTS_API_KEY: ci_dummy_korea_nts_key_xxxxxxxxxxxxxx
      KOREA_LOCALDATA_API_KEY: ci_dummy_korea_localdata_key_xxxxxxxx
      ADMIN_EMAILS: ci-dummy-admin@example.com
      CRON_SECRET: ci_dummy_cron_secret_xxxxxxxxxxxxxxxxxxxxxxxx
      RESEND_API_KEY: re_ci_dummy_resend_api_key
      RESEND_FROM_EMAIL: ci-dummy@resend.dev
      ANTHROPIC_API_KEY: sk-ant-ci-dummy-anthropic-api-key-xxxxxxxx
      OPENAI_API_KEY: sk-ci-dummy-openai-api-key-xxxxxxxx
      IG_APP_ID: stub-ig-app-id
      IG_APP_SECRET: stub-ig-app-secret
      IG_WEBHOOK_VERIFY_TOKEN: stub-ig-verify-token
      IG_REDIRECT_URI: https://stub.example.com/api/oauth/instagram/callback
      # smoke만 실행 — inbox.spec.ts는 HESYA_TEST_DATABASE_URL 없어 자동 skip.
      # 실 시나리오는 PostgreSQL service container + migration이 필요해
      # 별도 인프라 작업으로 분리. 본 e2e-smoke는 dev 서버 + Playwright 자체 작동만 보장.
    steps:
      - uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - name: Install
        run: pnpm install --frozen-lockfile
      # Playwright 브라우저는 lockfile에 안 박혀 매번 ~30초 다운로드. cache로 5초 복원.
      # key는 lockfile hash 기반 — playwright 버전 업 시 자동 갱신.
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
      - name: Install Playwright browsers (chromium)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm --filter @hesya/web exec playwright install --with-deps chromium
      # 캐시 적중 시에도 system deps(libnss3 등)는 매번 설치 필요 (브라우저 binary만 캐시됨)
      - name: Install Playwright system deps
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: pnpm --filter @hesya/web exec playwright install-deps chromium
      - name: Run e2e smoke
        run: pnpm --filter @hesya/web e2e smoke.spec.ts
      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/playwright-report
          retention-days: 7
